name: Build Scion Images

on:
  workflow_dispatch:
    inputs:
      registry:
        description: 'Container registry (e.g., ghcr.io/myorg)'
        required: true
      target:
        description: 'Build target'
        type: choice
        options:
          - common
          - all
          - core-base
          - harnesses
        default: 'common'
      tag:
        description: 'Image tag'
        default: 'latest'
      platform:
        description: 'Target platform(s)'
        type: choice
        options:
          - all
          - linux/amd64
          - linux/arm64
        default: 'all'

  workflow_call:
    inputs:
      registry:
        description: 'Container registry (e.g., ghcr.io/myorg)'
        required: true
        type: string
      target:
        description: 'Build target (common, all, core-base, harnesses)'
        type: string
        default: 'common'
      tag:
        description: 'Image tag'
        type: string
        default: 'latest'
      platform:
        description: 'Target platform(s) (all, linux/amd64, linux/arm64)'
        type: string
        default: 'all'

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: startsWith(inputs.registry, 'docker.io')
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push images
        run: |
          image-build/scripts/build-images.sh \
            --registry "${{ inputs.registry }}" \
            --target "${{ inputs.target }}" \
            --tag "${{ inputs.tag }}" \
            --platform "${{ inputs.platform }}" \
            --push
