# Scion Agent Configuration
#
# Settings merge order: defaults -> global (~/.scion/) -> grove (.scion/)
# Top-level settings can be overridden via environment variables.

# Active profile determines which runtime to use
# Env: SCION_ACTIVE_PROFILE
active_profile: local

# Default harness template for new agents
# Env: SCION_DEFAULT_TEMPLATE
default_template: gemini

# Bucket configuration for cloud storage (optional)
# bucket:
#   provider: ""      # Env: SCION_BUCKET_PROVIDER
#   name: ""          # Env: SCION_BUCKET_NAME
#   prefix: ""        # Env: SCION_BUCKET_PREFIX

# Runtime configurations
runtimes:
  docker:
    host: ""
  container:
    tmux: true
  kubernetes:
    context: ""
    namespace: ""

# Harness definitions
harnesses:
  gemini:
    image: us-central1-docker.pkg.dev/ptone-misc/public-docker/scion-gemini:latest
    user: scion
  claude:
    image: us-central1-docker.pkg.dev/ptone-misc/public-docker/scion-claude:latest
    user: scion
  opencode:
    image: us-central1-docker.pkg.dev/ptone-misc/public-docker/scion-opencode:latest
    user: scion
  codex:
    image: us-central1-docker.pkg.dev/ptone-misc/public-docker/scion-codex:latest
    user: scion

# Profiles combine runtime with optional overrides
profiles:
  local:
    runtime: container  # Auto-adjusted by OS
    tmux: true
    # harness_overrides:
    #   gemini:
    #     image: custom-image:tag
  remote:
    runtime: kubernetes
    tmux: true
