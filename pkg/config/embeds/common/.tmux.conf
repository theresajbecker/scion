# --- Color & Terminal Settings ---

# Set the default terminal mode to 256 colors
set -g default-terminal "xterm-256color"


# --- General Quality of Life ---

# Increase scrollback buffer size
set -g history-limit 10000

# Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

# Enable mouse support (clicking, resizing, scrolling)
set -g mouse on

# --- Visual Styling (Example 256 Color Theme) ---

# Status bar colors
set -g status-style bg=colour235,fg=colour136

# Status bar content
set -g status-left "[scion] "
set -g status-right-length 100
set -g status-right "#[fg=colour244]#(echo $SCION_TEMPLATE_NAME) #[fg=colour136]/ #[fg=colour166]#(echo $SCION_AGENT_NAME) #[fg=colour136](#(echo $SCION_BROKER_NAME)) #[fg=colour136]%H:%M %d-%b-%y"

# Allow programs to bypass tmux and talk directly to the terminal (required for banners/images)
set -g allow-passthrough on

# Inform tmux that the outside terminal supports RGB/TrueColor
set -as terminal-overrides ",xterm*:Tc"

# Window title colors
set-window-option -g window-status-style fg=colour244,bg=default
set-window-option -g window-status-current-style fg=colour166,bg=default,bright

# Pane border colors
set -g pane-border-style fg=colour235
set -g pane-active-border-style fg=colour240

# Message text
set -g message-style bg=colour235,fg=colour166

set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
